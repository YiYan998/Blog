<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的中心 - 个人博客</title>
    <link rel="stylesheet" href="css/common.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .container {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: white;
        font-size: 1rem;
        padding: 0.5rem 1rem;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        transition: all 0.3s ease;
        margin-bottom: 2rem;
      }

      .back-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateX(-5px);
      }

      .profile-card {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        text-align: center;
        margin-bottom: 2rem;
      }

      .avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 5px solid #667eea;
        margin-bottom: 1.5rem;
        transition: transform 0.3s ease;
      }

      .avatar:hover {
        transform: scale(1.05);
      }

      .profile-card h1 {
        color: #333;
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }

      .profile-card .subtitle {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
      }

      .stats {
        display: flex;
        justify-content: center;
        gap: 3rem;
        padding: 1.5rem 0;
        border-top: 1px solid #eee;
        border-bottom: 1px solid #eee;
      }

      .stat-item {
        text-align: center;
      }

      .stat-item .number {
        font-size: 2rem;
        font-weight: bold;
        color: #667eea;
      }

      .stat-item .label {
        color: #666;
        font-size: 0.9rem;
        margin-top: 0.3rem;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-top: 2rem;
      }

      .info-card {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        padding: 1.5rem;
        border-radius: 15px;
        transition: all 0.3s ease;
      }

      .info-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .info-card i {
        font-size: 2rem;
        color: #667eea;
        margin-bottom: 1rem;
      }

      .info-card h3 {
        color: #333;
        margin-bottom: 0.5rem;
      }

      .info-card p {
        color: #666;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .skills-section {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }

      .skills-section h2 {
        color: #333;
        margin-bottom: 1.5rem;
        font-size: 1.5rem;
      }

      .skill-bars {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      .skill-item {
        background: #f8f9fa;
        padding: 1rem 1.5rem;
        border-radius: 10px;
      }

      .skill-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
      }

      .skill-name {
        color: #333;
        font-weight: 600;
      }

      .skill-percent {
        color: #667eea;
        font-weight: bold;
      }

      .skill-bar {
        height: 8px;
        background: #e9ecef;
        border-radius: 4px;
        overflow: hidden;
      }

      .skill-progress {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 4px;
        transition: width 1s ease;
      }

      @media (max-width: 768px) {
        .stats {
          flex-direction: column;
          gap: 1.5rem;
        }

        .profile-card h1 {
          font-size: 1.5rem;
        }

        .avatar {
          width: 120px;
          height: 120px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="main.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> 返回首页
      </a>

      <div class="profile-card">
        <img src="imgs/对饮.jpg" alt="个人头像" class="avatar" />
        <h1>翌颜</h1>
        <p class="subtitle">热爱前端技术，专注于网页开发与设计</p>

        <div class="stats">
          <div class="stat-item">
            <div class="number">12</div>
            <div class="label">文章数</div>
          </div>
          <div class="stat-item">
            <div class="number">86</div>
            <div class="label">留言数</div>
          </div>
          <div class="stat-item">
            <div class="number">3</div>
            <div class="label">作品数</div>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <i class="fas fa-graduation-cap"></i>
            <h3>学习经历</h3>
            <p>正在学习HTML、CSS、JavaScript等前端技术，对响应式设计和用户体验有浓厚兴趣。</p>
          </div>
          <div class="info-card">
            <i class="fas fa-heart"></i>
            <h3>兴趣爱好</h3>
            <p>摄影、旅行、阅读和音乐，喜欢用镜头记录生活中的美好瞬间。</p>
          </div>
          <div class="info-card">
            <i class="fas fa-bullseye"></i>
            <h3>未来目标</h3>
            <p>成为一名优秀的前端工程师，创造更好的用户体验。</p>
          </div>
        </div>
      </div>

      <div class="skills-section">
        <h2><i class="fas fa-code"></i> 技能展示</h2>
        <div class="skill-bars">
          <div class="skill-item">
            <div class="skill-header">
              <span class="skill-name">HTML5</span>
              <span class="skill-percent">85%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-progress" style="width: 85%"></div>
            </div>
          </div>
          <div class="skill-item">
            <div class="skill-header">
              <span class="skill-name">CSS3</span>
              <span class="skill-percent">78%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-progress" style="width: 78%"></div>
            </div>
          </div>
          <div class="skill-item">
            <div class="skill-header">
              <span class="skill-name">JavaScript</span>
              <span class="skill-percent">65%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-progress" style="width: 65%"></div>
            </div>
          </div>
          <div class="skill-item">
            <div class="skill-header">
              <span class="skill-name">响应式设计</span>
              <span class="skill-percent">72%</span>
            </div>
            <div class="skill-bar">
              <div class="skill-progress" style="width: 72%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const skillBars = document.querySelectorAll(".skill-progress");
        skillBars.forEach((bar) => {
          const width = bar.style.width;
          bar.style.width = "0";
          setTimeout(() => {
            bar.style.width = width;
          }, 300);
        });
      });
    </script>
  </body>
</html>
